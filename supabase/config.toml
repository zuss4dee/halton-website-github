# Supabase local config — deploy functions with: supabase functions deploy test-notion

[api]
enabled = true
port = 54321

[functions.test-notion]
verify_jwt = true

# Cal.com server-to-server webhook — no Supabase JWT
[functions.catch-booking]
verify_jwt = false

[functions.run-outbound]
verify_jwt = true

# Resend inbound email.received — no Supabase JWT
[functions.inbound-webhook]
verify_jwt = false
